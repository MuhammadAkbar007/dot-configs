# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
${custom.git_server}\
$git_status\
$git_branch\
$package\
$java\
$kotlin\
$gradle\
$lua\
$nodejs\
$python\
$cmd_duration\
$battery\
$line_break\
$username\
$hostname\
$character\
"""

[username]
format = '[$user]($style)'
style_user = "bold green"
show_always = true

[hostname]
ssh_only = false
format = "[ ΎΝΨ ](white)[$hostname]($style)"
trim_at = "-"
style = "bold yellow"
disabled = false

[character]
success_symbol = '[ ΎΤ╡](bold yellow)'
error_symbol = '[ ΎΤ╡](bold red)'
vicmd_symbol = '[ ΎΤ╡](bold purple)'

[directory]
style = "bold fg:#ffd700"
truncation_length = 99
home_symbol = 'ΎΑΧ '
truncate_to_repo = false
format = "[$path]($style)[$lock_symbol]($lock_style) "

[directory.substitutions]
"Documents" = "ΎΑφ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = " ΎΑ╛  "
"Videos" = " ≤░ρε "
"akbarDev" = "≤░ρη "
"install_me" = "ΌεΥ "
"infinity" = " ΎΥο "
"tg" = "ΌΙΩ "
"nvim" = "ΌθΖ "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[line_break]
disabled = false

[battery]
full_symbol = "ΏθΦΜ"
charging_symbol = "ΏθΦΝ"
discharging_symbol = "έγκ"
unknown_symbol = '≤░Β╜ '
empty_symbol = '≤░ΓΟ '
format = '[$symbol$percentage]($style) '
disabled = false

[[battery.display]]
threshold = 30
style = "bold red"

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = '[έΠ▒ $duration]($style)'
style = 'yellow'

[custom.git_server]
#disabled = true
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="ΎΡΙ  "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="ΎΛΨ  "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="ΎΖ▒  "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="Ύηκ  "
else
    GIT_REMOTE_SYMBOL="ΎΘΤ  "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
style = "white"
format = '[$output]($style) '
